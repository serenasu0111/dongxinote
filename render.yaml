services:
  - type: web
    name: dongxinote-api
    runtime: node
    buildCommand: npm install && npm run build:server
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DOUBAO_API_KEY
        sync: false
      - key: DOUBAO_BASE_URL
        value: https://ark.cn-beijing.volces.com/api/v3
